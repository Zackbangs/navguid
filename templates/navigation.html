<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NavGuid</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1f3a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.big-text {
    font-size: 22px;
    margin: 15px 0;
}

.status {
    font-size: 26px;
    font-weight: bold;
    margin-top: 20px;
}

.hazard {
    font-size: 22px;
    margin-top: 10px;
    color: #ffcc00;
}

button {
    width: 90%;
    padding: 18px;
    font-size: 20px;
    margin-top: 20px;
    border-radius: 12px;
    border: none;
    background: #2d6cdf;
    color: white;
}

video {
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <h2>NavGuid Live Navigation</h2>

    <!-- CAMERA -->
    <video id="camera" autoplay playsinline></video>

    <!-- NAVIGATION STATUS -->
    <div class="status" id="navText">
        Say your destination
    </div>

    <!-- HAZARD ALERT -->
    <div class="hazard" id="hazardText">
        No hazard detected
    </div>

    <!-- CONTROL -->
    <button onclick="startNavigation()">Start Navigation</button>

</div>

<script>
let recognition;
let destination = "";
let currentStep = 0;
let steps = [];

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    msg.pitch = 1;
    speechSynthesis.speak(msg);
}

function startNavigation() {
    startVoice();
    startCamera();
}

function startVoice() {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;

    recognition.onresult = (event) => {
        let transcript = event.results[event.results.length - 1][0].transcript;

        if (!destination) {
            destination = transcript;
            document.getElementById("navText").innerText = "Getting route...";
            speak("Getting route to " + destination);
            getRoute(destination);
        }
    };

    recognition.start();
}

function getRoute(dest) {
    fetch("/route?destination=" + dest)
        .then(res => res.json())
        .then(data => {
            steps = data.steps;
            currentStep = 0;
            speakStep();
            trackPosition();
        });
}

function speakStep() {
    if (steps[currentStep]) {
        let step = steps[currentStep];
        document.getElementById("navText").innerText = step;
        speak(step);
    }
}

function trackPosition() {
    navigator.geolocation.watchPosition(pos => {
        nextStep();
    });
}

function nextStep() {
    if (currentStep < steps.length - 1) {
        currentStep++;
        speakStep();
    } else {
        speak("You have arrived");
    }
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        document.getElementById("camera").srcObject = stream;
        detectHazard();
    });
}

function detectHazard() {
    const video = document.getElementById("camera");
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    setInterval(() => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        let data = canvas.toDataURL("image/jpeg");

        fetch("/detect", {
            method: "POST",
            body: JSON.stringify({ image: data }),
            headers: { "Content-Type": "application/json" }
        })
        .then(res => res.json())
        .then(data => {
            if (data.hazard_detected) {
                document.getElementById("hazardText").innerText = data.message;
                speak(data.message);
            }
        });

    }, 2000);
}
</script>

</body>
</html>
